<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- Primary SEO Meta Tags -->
    <title>HappyConvert - Free Online Video Cutter, Compressor & Converter</title>
    <meta name="description" content="Edit, crop, compress, and transcode videos in your browser. Fully local WebAssembly execution, zero uploads, completely private and offline-capable.">
    <meta name="keywords" content="happyconvert, video trimmer online, local video converter, compress video offline, crop video browser, browser ffmpeg, private media editor, no upload cutter">
    <meta name="robots" content="index, follow">
    <meta name="author" content="HappyConvert">
    <meta name="publisher" content="HappyConvert">
    <link rel="canonical" href="https://happyconvert.app/">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/logo.svg">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://happyconvert.app/">
    <meta property="og:title" content="HappyConvert - Free Online Media Studio">
    <meta property="og:description" content="Fully offline client-side video editor. Crop, trim, compress, and convert media files locally inside your browser sandbox. Privacy guaranteed.">
    <meta property="og:image" content="https://happyconvert.app/og-banner.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://happyconvert.app/">
    <meta property="twitter:title" content="HappyConvert - Browser Media Editor">
    <meta property="twitter:description" content="Local WebAssembly video editing with zero server uploads. Clean, secure, fast, and free.">
    <meta property="twitter:image" content="https://happyconvert.app/og-banner.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <script>
      document.documentElement.classList.add("js-enabled");
    </script>
    <style>
      html.js-enabled .seo-static {
        display: none !important;
      }
    </style>

    <!-- Structured Data JSON-LD for Google Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "HappyConvert",
        "operatingSystem": "Web, Windows, macOS, Linux, iOS, Android",
        "applicationCategory": "MultimediaApplication",
        "offers": {
          "@type": "Offer",
          "price": "0.00",
          "priceCurrency": "USD"
        },
        "description": "An offline-first, client-side browser studio for cutting, converting, compressing, and cropping videos locally utilizing WebAssembly. Zero files are uploaded to servers.",
        "browserRequirements": "Requires HTML5, WebAssembly support",
        "featureList": "Local Video Trimming, Local Video Compression, Video to GIF Conversion, Audio Extraction, Frame Cropping, Offline Executions"
      }
    </script>
  </head>
  <body class="light-theme">
    <div id="root">
      <main class="boot-fallback" aria-live="polite">
        <div class="boot-fallback-card">
          <img src="/logo.svg" alt="HappyConvert" class="boot-fallback-logo">
          <strong>HappyConvert</strong>
          <span>Loading browser media tools...</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
